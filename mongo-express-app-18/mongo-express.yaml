apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express-ac-deployment
  labels:
    app: mongo-express-ac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express-ac
  template:
    metadata:
      labels:
        app: mongo-express-ac
    spec:
      containers:
        - name: mongo-express-ac
          image: mongo-express
          ports:
            - containerPort: 8081
          env:
            # MongoDB service hostname (internal to Kubernetes cluster)
            - name: ME_CONFIG_MONGODB_SERVER
              valueFrom:
                configMapKeyRef:
                  name: mongodb-ac-configmap
                  key: database-url

            # MongoDB admin username from Secret
            - name: ME_CONFIG_MONGODB_ADMINUSERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-ac-secret
                  key: mongo-root-username

            # MongoDB admin password from Secret
            - name: ME_CONFIG_MONGODB_ADMINPASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-ac-secret
                  key: mongo-root-password

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express-ac-service
spec:
  selector:
    app: mongo-express-ac

  # Service type "LoadBalancer" exposes the application externally.
  # In cloud environments, this provisions an external IP.
  # In local setups (like Minikube/Docker Desktop), it may require additional steps.
  type: LoadBalancer

  ports:
    - protocol: TCP
      port: 8081 # Service port (inside cluster)
      targetPort: 8081 # Container port

      # NodePort exposes the service on a static port on each node.
      # Accessible via: http://<node-ip>:30000
      # Valid range: 30000–32767
      nodePort: 30000
