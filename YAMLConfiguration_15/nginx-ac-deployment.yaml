apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ac-deployment
  labels:
    app: nginx-ac
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-ac
  template:
    metadata:
      labels:
        app: nginx-ac
    spec:
      containers:
        - name: nginx-ac
          image: nginx:1.24
          ports:
            - containerPort: 5000
